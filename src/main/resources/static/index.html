<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Subastas Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Sistema de Subastas Online</h1>
    <p>costo pero quedo piola</p>
</header>

<main>
    <section class="formulario">
        <h2>Crear subasta</h2>

        <form id="formSubasta">
            <input type="text" id="titulo" placeholder="Título del producto" required>
            <input type="text" id="descripcion" placeholder="Descripción" required>
            <input type="number" id="precioBase" placeholder="Precio base" required>

            <button type="submit">Crear</button>
        </form>
    </section>

    <section>
        <h2>Subastas activas</h2>
        <div id="listaSubastas" class="contenedor-subastas"></div>
    </section>
</main>

<script src="app.js"></script>
</body>
</html>
